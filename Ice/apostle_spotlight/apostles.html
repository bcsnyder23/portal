<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #E8ECED;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            background-image: url('images/christus.webp');
            background-size: cover;
            background-position: center;
            background-color: #1a2530;
            /* Fallback for the dark starry space */
            border: 6px solid #000000;
            border-radius: 20px;
            padding: 40px 20px 60px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: #FFFFFF;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 1rem;
            margin-bottom: 2.5rem;
            color: #FFFFFF;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
        }

        .fp-grid {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 4rem;
        }

        .q12-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px 30px;
            margin-bottom: 2rem;
            justify-items: center;
        }

        .card {
            display: block;
            text-decoration: none;
            transition: transform 0.3s ease;
            border-radius: 50%;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            display: block;
            width: 140px;
            height: 140px;
            object-fit: cover;
            object-position: center top;
            border-radius: 50%;
            border: 4px solid #FFFFFF;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            background-color: #ffffff;
        }
    </style>
</head>

<body>
    <main>
        <h1>First Presidency</h1>
        <div class="fp-grid">
            <a class="card" href="images/eyring.webp" target="_blank">
                <img src="images/eyring.webp" alt="Elder Eyring">
            </a>
            <a class="card" href="images/oaks.webp" target="_blank">
                <img src="images/oaks.webp" alt="Elder Oaks">
            </a>
            <a class="card" href="images/christofferson.webp" target="_blank">
                <img src="images/christofferson.webp" alt="Elder Christofferson">
            </a>
        </div>
        <!--q12 grid-->
        <h1>Quorum of the Twelve Apostles</h1>
        <div class="q12-grid">
            <a class="card" href="images/uchtdorf.webp" target="_blank"><img src="images/uchtdorf.webp"
                    alt="Elder Uchtdorf"></a>
            <a class="card" href="images/bednar.webp" target="_blank"><img src="images/bednar.webp"
                    alt="Elder Bednar"></a>
            <a class="card" href="images/cook.webp" target="_blank"><img src="images/cook.webp" alt="Elder Cook"></a>
            <a class="card" href="images/anderson.webp" target="_blank"><img src="images/anderson.webp"
                    alt="Elder Anderson"></a>

            <a class="card" href="images/rasband.webp" target="_blank"><img src="images/rasband.webp"
                    alt="Elder Rasband"></a>
            <a class="card" href="images/stevenson.webp" target="_blank"><img src="images/stevenson.webp"
                    alt="Elder Stevenson"></a>
            <a class="card" href="images/renlund.webp" target="_blank"><img src="images/renlund.webp"
                    alt="Elder Renlund"></a>
            <a class="card" href="images/gong.webp" target="_blank"><img src="images/gong.webp" alt="Elder Gong"></a>

            <a class="card" href="images/soares.webp" target="_blank"><img src="images/soares.webp"
                    alt="Elder Soares"></a>
            <a class="card" href="images/kearon.webp" target="_blank"><img src="images/kearon.webp"
                    alt="Elder Kearon"></a>
            <a class="card" href="images/causse.webp" target="_blank"><img src="images/causse.webp"
                    alt="Elder Causse"></a>
            <a class="card" href="images/gilbert.webp" target="_blank"><img src="images/gilbert.webp"
                    alt="Elder Gilbert"></a>
        </div>
    </main>
</body>

</html>
